<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login Page – Test Cases UI</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #F7F5F2;
    --card:    #FFFFFF;
    --ink:     #1A1A1A;
    --muted:   #7A7672;
    --border:  #E2DED9;
    --accent:  #1A1A1A;
    --error:   #C0392B;
    --success: #1E6B45;
    --input-bg:#FAFAF8;
  }

  body {
    min-height: 100vh;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
    color: var(--ink);
  }

  /* subtle grid texture */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.45;
    pointer-events: none;
  }

  .wrapper {
    width: 100%;
    max-width: 420px;
    padding: 24px;
    position: relative;
    z-index: 1;
    animation: rise 0.5s ease both;
  }

  @keyframes rise {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* brand */
  .brand {
    text-align: center;
    margin-bottom: 32px;
  }
  .brand-icon {
    width: 48px; height: 48px;
    background: var(--ink);
    border-radius: 14px;
    display: inline-flex; align-items: center; justify-content: center;
    margin-bottom: 14px;
  }
  .brand-icon svg { width: 24px; height: 24px; }
  .brand h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 26px; font-weight: 400;
    letter-spacing: -0.5px;
    color: var(--ink);
  }
  .brand p {
    font-size: 14px; color: var(--muted);
    margin-top: 4px;
  }

  /* card */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 36px 32px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.04);
  }

  .field { margin-bottom: 18px; }

  label {
    display: block;
    font-size: 13px; font-weight: 500;
    color: var(--ink);
    margin-bottom: 7px;
    letter-spacing: 0.01em;
  }

  .input-wrap { position: relative; }

  .input-wrap svg {
    position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
    width: 16px; height: 16px;
    color: var(--muted); pointer-events: none;
  }

  input[type="text"],
  input[type="password"] {
    width: 100%;
    padding: 11px 14px 11px 40px;
    background: var(--input-bg);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; color: var(--ink);
    transition: border-color 0.15s, box-shadow 0.15s;
    outline: none;
  }
  input:focus {
    border-color: var(--ink);
    box-shadow: 0 0 0 3px rgba(26,26,26,0.08);
  }
  input.error { border-color: var(--error); }
  input.error:focus { box-shadow: 0 0 0 3px rgba(192,57,43,0.1); }

  /* password toggle */
  .toggle-pw {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    background: none; border: none; cursor: pointer;
    color: var(--muted); padding: 2px;
    display: flex; align-items: center;
  }
  .toggle-pw:hover { color: var(--ink); }

  /* hint text */
  .hint {
    font-size: 11.5px; color: var(--muted);
    margin-top: 5px;
  }

  /* alert banner */
  .alert {
    padding: 10px 14px;
    border-radius: 9px;
    font-size: 13px; font-weight: 500;
    margin-bottom: 18px;
    display: none;
    align-items: center; gap: 8px;
  }
  .alert.show { display: flex; }
  .alert.alert-error   { background: #FDF2F1; border: 1px solid #F0B8B4; color: var(--error); }
  .alert.alert-success { background: #F0FAF4; border: 1px solid #A3D9B8; color: var(--success); }

  /* submit button */
  .btn {
    width: 100%;
    padding: 13px;
    background: var(--ink);
    color: #fff;
    border: none; border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14.5px; font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: background 0.15s, transform 0.1s;
    margin-top: 6px;
  }
  .btn:hover  { background: #333; }
  .btn:active { transform: scale(0.98); }

  /* divider */
  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 22px 0;
    color: var(--muted); font-size: 12px;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  /* links */
  .links {
    display: flex; justify-content: space-between;
    font-size: 12.5px; color: var(--muted);
    margin-top: 18px;
  }
  .links a { color: var(--ink); text-decoration: none; font-weight: 500; }
  .links a:hover { text-decoration: underline; }

  /* test badge */
  .test-badge {
    text-align: center; margin-top: 20px;
    font-size: 11px; color: var(--muted);
  }
  .test-badge span {
    display: inline-block;
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 12px;
    background: var(--card);
  }
</style>
</head>
<body>

<div class="wrapper">
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <h1>Welcome back</h1>
    <p>Sign in to your account to continue</p>
  </div>

  <div class="card">

    <!-- Alert banner -->
    <div class="alert" id="alertBox">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      <span id="alertText"></span>
    </div>

    <!-- Username -->
    <div class="field">
      <label for="username">Username</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
        </svg>
        <input type="text" id="username" placeholder="Enter your username" autocomplete="username"/>
      </div>
    </div>

    <!-- Password -->
    <div class="field">
      <label for="password">Password</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
        <input type="password" id="password" placeholder="Enter your password (8–12 chars)" autocomplete="current-password"/>
        <button class="toggle-pw" type="button" onclick="togglePw()" title="Show/hide password">
          <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <div class="hint">Password must be 8–12 characters</div>
    </div>

    <!-- Login button -->
    <button class="btn" onclick="handleLogin()">Sign In</button>

    <div class="divider">or</div>

    <div class="links">
      <span>Don't have an account? <a href="#">Register</a></span>
      <a href="#">Forgot password?</a>
    </div>
  </div>

  <div class="test-badge">
    <span>Task 1 &amp; 2 – Login Page UI &nbsp;·&nbsp; Mohamed Elmardi 22412431</span>
  </div>
</div>

<script>
  const VALID_USER = "admin";
  const VALID_PASS = "password1";

  function showAlert(msg, type) {
    const box = document.getElementById('alertBox');
    const txt = document.getElementById('alertText');
    box.className = `alert alert-${type} show`;
    txt.textContent = msg;
  }

  function clearAlert() {
    document.getElementById('alertBox').className = 'alert';
  }

  function setError(id) {
    document.getElementById(id).classList.add('error');
  }
  function clearErrors() {
    document.getElementById('username').classList.remove('error');
    document.getElementById('password').classList.remove('error');
  }

  function handleLogin() {
    clearErrors(); clearAlert();
    const user = document.getElementById('username').value.trim();
    const pass = document.getElementById('password').value;

    // TC_03: Empty fields
    if (!user && !pass) {
      setError('username'); setError('password');
      showAlert('Fields cannot be empty', 'error');
      return;
    }
    if (!user) { setError('username'); showAlert('Fields cannot be empty', 'error'); return; }
    if (!pass) { setError('password'); showAlert('Fields cannot be empty', 'error'); return; }

    // TC_04: Basic SQL injection check
    const sqlPattern = /('|--|;|\/\*|\*\/|OR\s+['"]?1['"]?\s*=\s*['"]?1|DROP|SELECT|INSERT|UPDATE|DELETE)/i;
    if (sqlPattern.test(user) || sqlPattern.test(pass)) {
      setError('username');
      showAlert('Invalid input detected. SQL injection attempt blocked.', 'error');
      return;
    }

    // TC_BV: Password length boundary (8–12)
    if (pass.length < 8) {
      setError('password');
      showAlert('Password too short. Minimum 8 characters required.', 'error');
      return;
    }
    if (pass.length > 12) {
      setError('password');
      showAlert('Password too long. Maximum 12 characters allowed.', 'error');
      return;
    }

    // TC_02: Invalid credentials
    if (user !== VALID_USER || pass !== VALID_PASS) {
      setError('username'); setError('password');
      showAlert('Invalid credentials. Please try again.', 'error');
      return;
    }

    // TC_01: Valid login
    showAlert('Login successful! Redirecting to dashboard...', 'success');
    document.querySelector('.btn').textContent = 'Redirecting...';
    document.querySelector('.btn').disabled = true;
  }

  function togglePw() {
    const inp = document.getElementById('password');
    const icon = document.getElementById('eyeIcon');
    if (inp.type === 'password') {
      inp.type = 'text';
      icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
    } else {
      inp.type = 'password';
      icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    }
  }

  // clear error styling on input
  document.getElementById('username').addEventListener('input', () => {
    document.getElementById('username').classList.remove('error');
  });
  document.getElementById('password').addEventListener('input', () => {
    document.getElementById('password').classList.remove('error');
  });
</script>
</body>
</html>
